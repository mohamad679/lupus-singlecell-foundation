backlog:
  - id: P0-001
    title: "Create master specification"
    phase: 0
    status: done
    type: documentation
    acceptance_criteria:
      - "docs/00_master_spec.md exists."
      - "The spec states that dataset feasibility audit is the first real scientific phase."
      - "The spec blocks model training before dataset feasibility approval."
      - "The spec includes human gates and judge rubrics."

  - id: P0-002
    title: "Create scientific hypothesis placeholder"
    phase: 0
    status: done
    type: documentation
    acceptance_criteria:
      - "docs/01_scientific_hypothesis.md exists."
      - "Unknown dataset facts are marked TODO."
      - "The hypothesis is explicitly marked as a draft placeholder."
      - "No dataset accessions are invented."

  - id: P0-003
    title: "Create project state files"
    phase: 0
    status: done
    type: state
    acceptance_criteria:
      - "state/project_state.yaml exists."
      - "state/current_feature.md exists."
      - "Modeling is marked as not allowed."
      - "Dataset downloads are marked as not allowed."

  - id: P0-004
    title: "Create dataset catalog schema"
    phase: 0
    status: done
    type: metadata
    acceptance_criteria:
      - "metadata/dataset_catalog.csv exists."
      - "The catalog contains only schema headers and TODO placeholder values."
      - "The catalog does not contain invented dataset accessions."

  - id: P0-005
    title: "Add metadata schema test"
    phase: 0
    status: done
    type: test
    acceptance_criteria:
      - "tests/test_metadata_schema.py exists."
      - "The test validates required dataset catalog columns."
      - "The test can run without network access."

  - id: P0-006
    title: "Run Phase 0 scaffold verification"
    phase: 0
    status: done
    type: verification
    acceptance_criteria:
      - "Metadata schema test passes locally."
      - "All required files are present."
      - "No model implementation files are added."
      - "No dataset files are downloaded."

  - id: P1-F001
    title: "Dataset Search Strategy"
    phase: 1
    status: done
    type: scientific
    acceptance_criteria:
      - "docs/02_dataset_feasibility_audit.md exists."
      - "configs/data_audit.yaml exists."
      - "scripts/00_audit_datasets.py exists."
      - "reports/tables/ exists."
      - "Tests for config and audit safety exist."
      - "No datasets are downloaded."
      - "No accessions are recorded unless verified from authoritative sources."
      - "Human Gate 1 remains PENDING."

  - id: P1-F002
    title: "GEO / NCBI metadata audit plan"
    phase: 1
    status: done
    type: bioinformatics
    blocked_by:
      - "Human Gate 1 remains PENDING for data acquisition"
    acceptance_criteria:
      - "GEO / NCBI audit protocol is documented."
      - "GEO search terms are documented in configs/data_audit.yaml."
      - "metadata/geo_candidate_schema.yaml exists."
      - "reports/tables/geo_candidate_datasets.csv exists with headers only."
      - "scripts/01_geo_metadata_search_plan.py exists."
      - "Tests for GEO schema and search plan safety exist."
      - "No full datasets are downloaded."
      - "No dataset accessions are invented."
      - "Human Gate 1 remains PENDING."

  - id: P1-F003
    title: "CELLxGENE feasibility query plan"
    phase: 1
    status: done
    type: bioinformatics
    blocked_by:
      - "Human Gate 1 remains PENDING for data acquisition"
    acceptance_criteria:
      - "CELLxGENE protocol is documented."
      - "CELLxGENE query terms are documented in configs/data_audit.yaml."
      - "metadata/cellxgene_candidate_schema.yaml exists."
      - "reports/tables/cellxgene_candidate_datasets.csv exists with headers only."
      - "scripts/02_cellxgene_metadata_plan.py exists."
      - "Tests for CELLxGENE schema and metadata plan safety exist."
      - "No full datasets are downloaded."
      - "No dataset accessions are invented."
      - "Human Gate 1 remains PENDING."

  - id: P1-F004
    title: "Dataset eligibility scoring schema"
    phase: 1
    status: done
    type: bioinformatics
    blocked_by:
      - "Human Gate 1 remains PENDING for data acquisition"
    acceptance_criteria:
      - "Dataset eligibility scoring framework is documented."
      - "metadata/dataset_eligibility_scoring.yaml exists."
      - "Total score is 100."
      - "Eligibility categories are defined."
      - "Hard rejection rules are explicit."
      - "scripts/03_score_dataset_eligibility.py exists."
      - "reports/tables/dataset_eligibility_scores.csv exists with headers only."
      - "Tests for scoring schema and safe scoring script exist."
      - "No unaudited candidates are scored as eligible."
      - "No full datasets are downloaded."
      - "No dataset accessions are invented."
      - "Human Gate 1 remains PENDING."

  - id: P1-F005
    title: "Audit one candidate dataset for feasibility"
    phase: 1
    status: todo
    type: bioinformatics
    blocked_by:
      - "P1-F004"
      - "Human Gate 1 remains PENDING for data acquisition"
    acceptance_criteria:
      - "One candidate row in metadata/dataset_catalog.csv is populated from verified source evidence."
      - "Unknown fields remain TODO."
      - "Access terms and raw/processed availability are recorded."
      - "No data files are downloaded."

  - id: P1-F006
    title: "Request dataset feasibility human gate"
    phase: 1
    status: todo
    type: governance
    blocked_by:
      - "At least one completed dataset feasibility audit"
    acceptance_criteria:
      - "Feasibility evidence is summarized."
      - "Risks and TODOs are documented."
      - "Human decision is recorded before any acquisition work."
